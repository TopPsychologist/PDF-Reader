# 推送 Git 标签 v*（例如 v1.0.0）时：在 macOS 上打包 zip + dmg，并创建/更新 GitHub Release（附件为可安装的 mac 产物；GitHub 仍会默认附带源码归档）。
# 用法：本地对齐 package.json 的 version 后执行
#   git tag v1.0.0 && git push origin v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure git tag matches package.json version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VER=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${PKG_VER}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "::error::标签 '$TAG' 须与 package.json 中 version 一致，应为 '$EXPECTED'（先改版本号再打同名标签）"
            exit 1
          fi

      - name: Bundle Epub.js vendor
        run: npm run bundle:epub

      - name: Build macOS x64 (zip + dmg)
        run: npm run build

      - name: Upload build artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: pdf-reader-mac-x64
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
