<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 不设严格 CSP：Electron 下 file://（尤其 app.asar 内）会将部分资源判为跨源，meta 中的 style-src/script-src 'self' 易拦截 styles.css、renderer 模块，导致无样式、脚本不执行 -->
  <title>PDF Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button id="openBtn" class="toolbar-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3h7l2 3h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
          <path d="M12 11v6"/>
          <path d="M9 14l3-3 3 3"/>
        </svg>
        <span>打开</span>
      </button>

      <button id="shelfBtn" class="toolbar-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>书架</span>
      </button>

      <button id="backToShelfBtn" class="toolbar-btn hidden">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
        <span>返回书架</span>
      </button>

      <div id="toolbarReading" class="toolbar-reading hidden">
      <div class="separator"></div>

      <button id="prevBtn" class="toolbar-btn" title="上一页 (←)" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="page-info">
        <input type="number" id="pageInput" value="1" min="1" disabled>
        <span>/</span>
        <span id="totalPages">0</span>
      </div>

      <button id="nextBtn" class="toolbar-btn" title="下一页 (→)" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>

      <div class="separator"></div>

      <button id="zoomOutBtn" class="toolbar-btn" title="缩小" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
          <path d="M8 11h6"/>
        </svg>
      </button>

      <input type="text" id="zoomLevel" class="zoom-level" value="100%" spellcheck="false" autocomplete="off" inputmode="decimal" tabindex="0" title="缩放百分比，可直接修改后按 Enter 或失去焦点生效" aria-label="缩放百分比" disabled />

      <button id="zoomInBtn" class="toolbar-btn" title="放大" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
          <path d="M11 8v6"/>
          <path d="M8 11h6"/>
        </svg>
      </button>

      <button id="fitWidthBtn" class="toolbar-btn" title="适应宽度" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- 竖线居中，左右箭头表示横向填满 -->
          <path d="M12 5v14"/>
          <path d="M12 12H6"/><path d="M6 12l2.5-2.5"/><path d="M6 12l2.5 2.5"/>
          <path d="M12 12h6"/><path d="M18 12l-2.5-2.5"/><path d="M18 12l-2.5 2.5"/>
        </svg>
      </button>

      <button id="fitHeightBtn" class="toolbar-btn" title="适应高度" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <!-- 横线居中，上下箭头表示纵向填满 -->
          <path d="M5 12h14"/>
          <path d="M12 12V6"/><path d="M12 6l-2.5 2"/><path d="M12 6l2.5 2"/>
          <path d="M12 12v6"/><path d="M12 18l-2.5-2"/><path d="M12 18l2.5-2"/>
        </svg>
      </button>

      <div class="separator"></div>

      <button id="tocBtn" class="toolbar-btn" type="button" disabled title="PDF 大纲目录（侧栏 · 区别于阅读书签列表）">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 7h13"/>
          <path d="M8 12h13"/>
          <path d="M8 17h13"/>
          <circle cx="4" cy="7" r="1" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/>
          <circle cx="4" cy="17" r="1" fill="currentColor" stroke="none"/>
        </svg>
      </button>

      <button id="bookmarkBtn" class="toolbar-btn" type="button" disabled title="在当前页添加阅读书签（⌘ / Ctrl + D）">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </button>

      <button id="showBookmarksBtn" class="toolbar-btn" type="button" disabled title="打开「我的书签」列表侧栏（与 PDF 大纲目录无关）">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M13 21H9a8 8 0 0 1-6-11.73 6 6 0 1 1 12 2.23 6 6 0 1 1-.36 12z"/>
          <circle cx="9" cy="8" r="1" fill="currentColor"/>
          <circle cx="15" cy="8" r="1" fill="currentColor"/>
        </svg>
      </button>
      </div>

      <button id="settingsBtn" type="button" class="toolbar-btn toolbar-settings-btn" title="设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.82l-.06-.06a1.65 1.65 0 00-.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.091 0 .19.027.273.082H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="content" id="content">
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="12" y2="12"/>
            <line x1="15" y1="15" x2="12" y2="12"/>
          </svg>
          <p class="drop-zone-text">将 PDF 文件拖放到这里</p>
          <p class="drop-zone-subtext">或点击上面的「打开」按钮（支持 PDF、EPUB）</p>
          <p class="drop-zone-subtext">点击"书架"按钮选择文件夹作为书架</p>
        </div>
      </div>

      <div id="shelfView" class="shelf-view">
        <div class="shelf-header">
          <h2 id="shelfTitle">书架</h2>
          <button id="changeFolderBtn" class="toolbar-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6"/>
              <path d="M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            <span>更换文件夹</span>
          </button>
        </div>
        <div id="shelfGrid" class="shelf-grid"></div>
        <div id="shelfEmpty" class="shelf-empty">
          <p>文件夹中没有 PDF 文件</p>
        </div>
      </div>

      <div id="pdfContainer" class="pdf-container"></div>

      <div id="epubContainer" class="epub-container" aria-hidden="true">
        <div id="epubViewer" class="epub-viewer"></div>
      </div>

      <div id="tocSidebar" class="toc-sidebar">
        <div class="toc-sidebar-header">
          <h3>PDF 大纲目录</h3>
          <button id="closeTocBtn" class="toolbar-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="tocList" class="toc-list"></div>
      </div>

      <div id="bookmarkSidebar" class="bookmark-sidebar">
        <div class="bookmark-sidebar-header">
          <h3>我的书签</h3>
          <button id="closeBookmarkBtn" class="toolbar-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="bookmarkList" class="bookmark-list"></div>
      </div>

      <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <span id="loadingText" class="loading-text">正在加载...</span>
      </div>
    </div>

    <div id="settingsOverlay" class="settings-overlay" role="presentation" aria-hidden="true">
      <div id="settingsBackdrop" class="settings-backdrop"></div>
      <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="settings-modal-header">
          <h2 id="settingsTitle" class="settings-modal-title">设置</h2>
          <button type="button" id="closeSettingsBtn" class="toolbar-btn settings-close-btn" aria-label="关闭">&times;</button>
        </div>
        <div class="settings-modal-body">
          <h3 class="settings-section-title">主题</h3>
          <div class="theme-list" id="themeList" role="listbox">
            <button type="button" role="option" class="theme-row" data-theme="midnight" aria-selected="false">
              <span class="theme-check" aria-hidden="true">✓</span><span class="theme-name">午夜蓝</span>
            </button>
            <button type="button" role="option" class="theme-row" data-theme="graphite" aria-selected="false">
              <span class="theme-check" aria-hidden="true">✓</span><span class="theme-name">石墨灰</span>
            </button>
            <button type="button" role="option" class="theme-row" data-theme="ocean" aria-selected="false">
              <span class="theme-check" aria-hidden="true">✓</span><span class="theme-name">深海青</span>
            </button>
            <button type="button" role="option" class="theme-row" data-theme="amber" aria-selected="false">
              <span class="theme-check" aria-hidden="true">✓</span><span class="theme-name">琥珀棕</span>
            </button>
            <button type="button" role="option" class="theme-row" data-theme="paper" aria-selected="false">
              <span class="theme-check" aria-hidden="true">✓</span><span class="theme-name">日间纸本</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="statusbar">
      <span id="fileName" class="file-name hidden">未打开文件</span>
      <span class="status-spacer"></span>
      <span id="bookmarkIndicator" class="bookmark-indicator hidden">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        已添加书签
      </span>
      <span id="statusText" class="status-text">就绪</span>
    </div>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
